<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeApex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            color: white;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
        }
        .edge-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 Login to CodeApex</h2>
        <div id="errorMsg" class="error"></div>
        <input type="text" id="username" placeholder="Username" value="testuser">
        <input type="password" id="password" placeholder="Password" value="123456">
        <button onclick="login()">Login</button>
        <div class="link">
            Don't have an account? <a href="register.html">Register</a>
        </div>
        <div class="edge-badge">
            ⚡ Edge Computing Ready
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('userId', data.user_id);
                    localStorage.setItem('username', username);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').innerText = data.error || 'Login failed';
                }
            } catch (error) {
                document.getElementById('errorMsg').innerText = 'Server error. Make sure backend is running.';
            }
        }

        // Check if already logged in
        if (localStorage.getItem('userId')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
